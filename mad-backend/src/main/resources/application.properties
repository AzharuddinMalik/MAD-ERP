# ===============================
# APP PROFILES
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/madcms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway Settings - Disabled to resolve local env conflicts
spring.flyway.enabled=false
spring.flyway.clean-disabled=true
spring.flyway.clean-on-validation-error=false
spring.jpa.properties.hibernate.format_sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# FILE UPLOAD LIMITS
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# SERVER PORT
# ===============================
server.address=0.0.0.0
server.port=${PORT:8080}
# ===============================
# SECURITY & JWT
# ===============================
# ✅ C1 FIX: JWT secret injected from environment. Production MUST set JWT_SECRET.
jwt.secret=${JWT_SECRET:MALIK_ART_DECOR_SECURE_KEY_123456789_!@#}


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:azharuddinmalik13@gmail.com}
# ✅ C4 FIX: App Password now injected from environment. Set MAIL_APP_PASSWORD env var.
spring.mail.password=${MAIL_APP_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# REDIS CACHE
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=simple
spring.cache.redis.time-to-live=300000
