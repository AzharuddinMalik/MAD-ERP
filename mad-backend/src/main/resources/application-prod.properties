# =======================================
# MAD-ERP: Production Configuration
# Phase 3 Security Hardening
# =======================================

# ── DATABASE (Auto-detect from ENV) ──────────────────────────────────
spring.datasource.url=${DATABASE_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate will auto-detect the dialect (PostgreSQL/MySQL)
spring.jpa.properties.hibernate.dialect_resolvers=org.hibernate.engine.jdbc.dialect.internal.StandardDialectResolver

# ── JPA / HIBERNATE ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── FLYWAY ─────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false

# ── SERVER ─────────────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=${PORT:8080}
# Remove version disclosure from error responses
server.error.include-stacktrace=never
server.error.include-message=never

# ── C3.1: ACTUATOR SECURITY ────────────────────────────────────────────
# Expose ONLY health, info, metrics — all others are denied in SecurityConfig
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized
management.endpoint.info.enabled=true
management.metrics.tags.application=mad-erp
management.info.env.enabled=true

# App metadata (surfaced via /actuator/info for admin monitoring)
info.app.name=MAD-ERP
info.app.description=Construction ERP System
info.app.version=1.0.0
info.app.encoding=UTF-8

# ── C3.4: PRODUCTION LOGGING ───────────────────────────────────────────
# File-based logging with rotation (Render persists /var/log or use external log drain)
logging.file.name=/var/log/mad-erp/app.log
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=3GB

# PII/credential sanitization: suppress verbose security + SQL logs in prod
logging.level.net.engineeringdigest.journalApp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=WARN
logging.level.com.zaxxer.hikari=WARN

# ── MAIL ────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:azharuddinmalik13@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── FILE UPLOAD ─────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
