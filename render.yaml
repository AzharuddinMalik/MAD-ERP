services:
  - type: web
    name: mad-backend
    env: java
    region: oregon
    buildCommand: chmod +x mvnw && ./mvnw.cmd clean package -DskipTests
    startCommand: java -jar target/journalApp-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mad-erp-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: mad-erp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mad-erp-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  - type: web
    name: mad-frontend
    env: static
    region: oregon
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mad-backend
          property: host

databases:
  - name: mad-erp-db
    databaseName: mad_erp
    user: mad_admin
    region: oregon
    plan: free
